services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GARMIN_EMAIL=${GARMIN_EMAIL}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
    networks:
      - garmin-network
    ports:
      - "8000:8000"

  zeroclaw:
    build:
      context: ./zeroclaw
      dockerfile: Dockerfile
    container_name: zeroclaw
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./zeroclaw/config.toml:/root/.zeroclaw/config.toml:ro
      - zeroclaw-data:/root/.zeroclaw/data
    networks:
      - garmin-network
    depends_on:
      - backend
    stdin_open: true
    tty: true

networks:
  garmin-network:
    driver: bridge

volumes:
  zeroclaw-data:
