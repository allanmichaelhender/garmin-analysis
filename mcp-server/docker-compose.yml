services:
  mcp-server:
    build: .
    container_name: garmin-mcp-server
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GARMIN_EMAIL=${GARMIN_EMAIL}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}
    volumes:
      - ./app:/app
      - ./scripts:/scripts
      - ./alembic:/alembic
    restart: unless-stopped
    networks:
      - mcp_network

networks:
  mcp_network:
    driver: bridge
